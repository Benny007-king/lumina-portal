# fly.toml app configuration file generated for lumina-portal on 2026-07-10T20:56:58Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'lumina-portal'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATA_DIR = '/data'
  PORTAL_ADDR = '0.0.0.0:8090'

[[mounts]]
  source = 'portal_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
