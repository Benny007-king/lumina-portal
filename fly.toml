# Fly.io config for the Lumina licensing portal.
# Deploy:  fly launch --no-deploy   (creates the app, keep this file)
#          fly volume create portal_data --size 1   (if using the built-in SQLite)
#          fly deploy
# Rename `app` to your unique Fly app name first.
app = "lumina-portal"
primary_region = "iad"   # pick one near you: fra, lhr, cdg, ams, etc.

[build]
  dockerfile = "Dockerfile"

[env]
  # PORT and internal_port MUST match — this is what Fly health-checks. The app
  # binds 0.0.0.0:$PORT. (If Fly's launcher generated a fly.toml with a different
  # internal_port, change it to match this, or vice-versa.)
  PORT = "8090"
  DATA_DIR = "/data"
  # PAYMENT_URL / DEMO_DOWNLOAD_URL can be set here or as `fly secrets`.

[http_service]
  internal_port = 8090
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0   # set 1 to avoid cold starts on /api/latest

# Persist the SQLite DB (incl. the Ed25519 signing key!). OMIT this block and set
# DATABASE_URL as a secret if you instead use managed Postgres / Supabase.
[[mounts]]
  source = "portal_data"
  destination = "/data"
