name: Deploy to Fly.io

# Every push to main redeploys the portal. Requires a repo secret FLY_API_TOKEN:
#   fly tokens create deploy -x 999999h     (or Fly dashboard → Tokens)
#   then GitHub → repo → Settings → Secrets and variables → Actions → New secret
#   name FLY_API_TOKEN, value = the token.
on:
  push:
    branches: [main]

jobs:
  deploy:
    name: fly deploy
    runs-on: ubuntu-latest
    concurrency: deploy-group   # never run two deploys at once
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
